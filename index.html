<!DOCTYPE html>
<html>
<head>
<title>Dynan Marketplace</title>

<style>

body{
background:black;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#111;
padding:40px;
width:380px;
border-radius:12px;
text-align:center;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:10px;
background:#0d6efd;
color:white;
}

.channel{
background:#25D366;
}

</style>
</head>

<body>

<div class="box">

<h2>Dynan Marketplace 🛍</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<a href="register.html">
<button>Buat Akun</button>
</a>

<a href="https://whatsapp.com/channel/0029VbCjQw8GE56pxtLIQa1c" target="_blank">
<button class="channel">📢 Join Saluran WhatsApp</button>
</a>

</div>

<script>

function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

if(user=="dynannotdev" && pass=="11092009"){
window.location="admin.html"
return
}

let users=JSON.parse(localStorage.getItem("users") || "[]")

for(let i=0;i<users.length;i++){
if(users[i].username==user && users[i].password==pass){
window.location="market.html"
return
}
}

alert("Akun tidak ditemukan")

}

</script>

</body>
</html>
