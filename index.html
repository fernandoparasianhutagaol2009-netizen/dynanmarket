<!DOCTYPE html>
<html>
<head>
<title>Login Market Dynan</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
width:90%;
max-width:500px;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
text-align:center;
}

h2{
font-size:28px;
}

input{
width:95%;
padding:14px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

.login{
background:#4CAF50;
color:white;
}

.register{
background:#2196F3;
color:white;
}

.switch{
background:none;
color:#2196F3;
}

</style>
</head>

<body>

<div class="box">

<div id="loginBox">

<h2>Login</h2>

<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">

<button class="login" onclick="login()">Login</button>

<p>Belum punya akun?</p>
<button class="switch" onclick="showRegister()">Buat Akun</button>

</div>


<div id="registerBox" style="display:none">

<h2>Daftar Akun</h2>

<input type="text" id="regUser" placeholder="Username baru">
<input type="password" id="regPass" placeholder="Password baru">

<button class="register" onclick="register()">Daftar</button>

<p>Sudah punya akun?</p>
<button class="switch" onclick="showLogin()">Login</button>

</div>

</div>


<script>

function register(){

let user=document.getElementById("regUser").value
let pass=document.getElementById("regPass").value

localStorage.setItem("user",user)
localStorage.setItem("pass",pass)

alert("Akun berhasil dibuat!")

showLogin()

}

function login(){

let user=document.getElementById("loginUser").value
let pass=document.getElementById("loginPass").value

let savedUser=localStorage.getItem("user")
let savedPass=localStorage.getItem("pass")

if(user==savedUser && pass==savedPass){

window.location.href="market.html"

}else{

alert("Username atau password salah")

}

}

function showRegister(){
document.getElementById("loginBox").style.display="none"
document.getElementById("registerBox").style.display="block"
}

function showLogin(){
document.getElementById("loginBox").style.display="block"
document.getElementById("registerBox").style.display="none"
}

</script>

</body>
</html>
