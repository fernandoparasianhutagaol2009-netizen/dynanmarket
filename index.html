<!DOCTYPE html>
<html>
<head>
<title>Login Market</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
width:90%;
max-width:600px;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
text-align:center;
}

h2{
margin-bottom:20px;
font-size:28px;
}

input{
width:95%;
padding:14px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#4CAF50;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

</style>
</head>

<body>

<div class="box">

<h2>Login Market</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(user=="admin" && pass=="12345"){

window.location.href="market.html"

}else{

alert("Username atau password salah")

}

}

</script>

</body>
</html>
