<!DOCTYPE html>
<html>
<head>
<title>Dynan Marketplace Login</title>

<style>

body{
background:black;
color:white;
font-family:sans-serif;
text-align:center;
padding-top:120px;
}

.login{
background:#111;
padding:40px;
border-radius:15px;
width:300px;
margin:auto;
box-shadow:0 0 20px cyan;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
background:cyan;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login">

<h2>Dynan Marketplace 🔐</h2>

<input type="text" id="user" placeholder="Username"><br>
<input type="password" id="pass" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p>Belum punya akun?</p>

<a href="register.html" style="color:cyan">Buat Akun</a>

</div>

<script>

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

// akun admin
if(u=="dynannotdev" && p=="11092009"){
window.location.href="admin.html"
return
}

// akun member
let users=JSON.parse(localStorage.getItem("users") || "[]")

let found=users.find(x=>x.username==u && x.password==p)

if(found){
window.location.href="market.html"
}else{
alert("Akun tidak ditemukan")
}

}

</script>
</body>
</html>
