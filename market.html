<!DOCTYPE html>
<html>
<head>
<title>Dynan Marketplace</title>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;
text-align:center;
background:black;
overflow-x:hidden;
}

h1{
margin-top:40px;
}

h3{
margin-top:40px;
}

hr{
margin:40px auto;
width:80%;
border:1px solid #333;
}

.produk{
margin-top:20px;
}

.paket{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
margin-top:15px;
}

button{
width:230px;
padding:12px;
background:#0d6efd;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
font-size:14px;
transition:0.3s;
}

button:hover{
background:#0a58ca;
transform:scale(1.05);
}

/* background bintang */

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<h1>Dynan Marketplace 🛍</h1>

<div class="produk">

<button onclick="buy('Jadi Bot 5 Bulan','25000')">5 Bulan - Rp25.000</button>

<button onclick="buy('Panel 10GB','10000')">10GB - Rp10.000</button>

<h3>4️⃣ Nokos All Negara</h3>

<div class="paket">
<button onclick="buy('Nokos Indonesia','5000')">Indonesia - Rp5.000</button>
<button onclick="admin()">🌍 Negara Lain Hubungi Admin</button>
</div>

</div>

<script>

function buy(product,price){

localStorage.setItem("product",product)
localStorage.setItem("price",price)

window.location.href="checkout.html"

}

function admin(){
window.open("https://wa.me/6283180072584")
}

/* efek bintang */

let stars=document.getElementById("stars")

for(let i=0;i<120;i++){

let star=document.createElement("div")
star.className="star"

star.style.top=Math.random()*100+"%"
star.style.left=Math.random()*100+"%"

stars.appendChild(star)

}

</script>

</body>
  </html>
