<!DOCTYPE html>
<html>
<head>
<title>Market Dynan</title>

<style>

body{
font-family:sans-serif;
background:#f2f2f2;
text-align:center;
margin:0;
}

.box{
background:white;
width:90%;
max-width:400px;
margin:auto;
margin-top:40px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.login{
background:#4CAF50;
color:white;
}

.logout{
background:red;
color:white;
}

.buy{
background:#2196F3;
color:white;
}

.channel{
background:#25D366;
color:white;
}

.product{
border:1px solid #ddd;
border-radius:8px;
padding:10px;
margin-top:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">

<h2>Login Market</h2>

<input type="text" id="username" placeholder="Username">
<br>
<input type="password" id="password" placeholder="Password">
<br>

<button class="login" onclick="login()">Login</button>

</div>

<!-- MARKET -->
<div class="box" id="marketBox" style="display:none">

<h2>Market Dynan</h2>

<button class="logout" onclick="logout()">Logout</button>

<h3>Produk</h3>

<div class="product">
<h4>Panel Bot</h4>
<p>Harga: Rp5.000</p>
<button class="buy" onclick="beli('Panel Bot')">Beli</button>
</div>

<div class="product">
<h4>Sewa Bot WhatsApp</h4>
<p>Harga: Rp10.000</p>
<button class="buy" onclick="beli('Sewa Bot WhatsApp')">Beli</button>
</div>

<div class="product">
<h4>Script Bot</h4>
<p>Harga: Rp15.000</p>
<button class="buy" onclick="beli('Script Bot')">Beli</button>
</div>

<h3>Saluran Kami</h3>

<a href="https://whatsapp.com/channel/0029VbCjQw8GE56pxtLIQa1c" target="_blank">
<button class="channel">Gabung Saluran WhatsApp</button>
</a>

</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user=="admin" && pass=="12345"){

document.getElementById("loginBox").style.display="none";
document.getElementById("marketBox").style.display="block";

}else{

alert("Username atau password salah");

}

}

function logout(){

document.getElementById("marketBox").style.display="none";
document.getElementById("loginBox").style.display="block";

}

function beli(produk){

alert("Kamu memilih membeli "+produk);

}

</script>

</body>
</html>
