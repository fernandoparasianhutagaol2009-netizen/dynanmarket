<!DOCTYPE html>
<html>
<head>

<style>

padding:20px;
text-align:center;
}

.box{
background:white;
width:95%;
max-width:700px;
margin:auto;
padding:30px;
border-radius:15px;

}

h2{
font-size:32px;
}

button{
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
width:100%;
}

.logout{
background:red;
color:white;
}

.buy{
background:#2196F3;
color:white;
}

.channel{
background:#25D366;
color:white;
}

.product{
border:1px solid #ddd;
border-radius:12px;
padding:20px;
margin-top:20px;
text-align:left;
}

.product h4{
font-size:22px;
margin:0;
}

.product p{
font-size:18px;
}

</style>
</head>

<body>

<div class="box">

<button class="logout" onclick="logout()">Logout</button>

<h3>Produk Kami</h3>

</div>

<div class="product">
<h4>Sewa Bot WhatsApp</h4>

</div>

<div class="product">

<button class="buy">Beli Sekarang</button>
</div>

<h3>Saluran Kami</h3>

<a href="https://whatsapp.com/channel/0029VbCjQw8GE56pxtLIQa1c" target="_blank">
<button class="channel">Gabung Saluran WhatsApp</button>
</a>

</div>

<script>

function logout(){
window.location.href="index.html"
}

</script>

</body>
</html>
